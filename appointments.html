<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCare Portal | Appointments</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/guard.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">
      <span class="brand-icon">&#10084;</span>
      <span>MediCare Portal</span>
    </div>
    <div class="topbar-user">
      <span id="welcomeMsg">Welcome, admin</span>
      <button id="logoutBtn" class="btn btn-outline">Logout</button>
    </div>
  </header>

  <main class="dashboard">
    <h1 class="page-title">Appointments Dashboard</h1>

    <!-- Feature 1: Stats overview -->
    <section class="stats-grid" id="statsGrid" aria-label="Appointment statistics">
      <div class="stat-card">
        <span class="stat-value" id="statTotal">0</span>
        <span class="stat-label">Total Appointments</span>
      </div>
      <div class="stat-card stat-upcoming">
        <span class="stat-value" id="statUpcoming">0</span>
        <span class="stat-label">Upcoming</span>
      </div>
      <div class="stat-card stat-completed">
        <span class="stat-value" id="statCompleted">0</span>
        <span class="stat-label">Completed</span>
      </div>
      <div class="stat-card stat-cancelled">
        <span class="stat-value" id="statCancelled">0</span>
        <span class="stat-label">Cancelled</span>
      </div>
    </section>

    <div class="dashboard-grid">
      <!-- Feature 2: Book appointment -->
      <section class="panel" id="bookPanel">
        <h2>Book New Appointment</h2>
        <form id="bookForm" class="book-form">
          <div class="field">
            <label for="patientName">Patient Name</label>
            <input type="text" id="patientName" placeholder="e.g. John Smith" required pattern="[A-Za-z\s]{4,100}$" title="Name must be between 4 and 100 characters and contain only letters and spaces.">
          </div>
          <div class="field">
            <label for="doctorSelect">Doctor</label>
            <select id="doctorSelect" required></select>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="apptDate">Date</label>
              <input type="date" id="apptDate" required>
            </div>
            <div class="field">
              <label for="apptTime">Time</label>
              <input type="time" id="apptTime" required>
            </div>
          </div>
          <div class="field">
            <label for="apptReason">Reason for Visit</label>
            <textarea id="apptReason" rows="2" placeholder="Brief description..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Book Appointment</button>
          <p id="bookSuccess" class="success-msg" hidden>Appointment booked successfully!</p>
        </form>
      </section>

      <!-- Feature 3: Doctor directory -->
      <section class="panel" id="doctorPanel">
        <h2>Doctor Directory</h2>
        <div class="doctor-list" id="doctorList"></div>
      </section>
    </div>

    <!-- Feature 4: Appointment list with search/filter/cancel -->
    <section class="panel panel-wide">
      <div class="panel-header">
        <h2>All Appointments</h2>
        <div class="filters">
          <input type="text" id="searchInput" class="search-input" placeholder="Search patient or doctor...">
          <select id="filterStatus">
            <option value="all">All Statuses</option>
            <option value="Upcoming">Upcoming</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
      </div>
      <div class="table-wrapper">
        <table class="appt-table">
          <thead>
            <tr>
              <th><button type="button" class="sort-header" data-sort-key="patient">Patient <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button type="button" class="sort-header" data-sort-key="doctor">Doctor <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button type="button" class="sort-header" data-sort-key="specialty">Specialty <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button type="button" class="sort-header active" data-sort-key="date">Date <span class="sort-indicator" aria-hidden="true">▼</span></button></th>
              <th><button type="button" class="sort-header" data-sort-key="time">Time <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th><button type="button" class="sort-header" data-sort-key="status">Status <span class="sort-indicator" aria-hidden="true"></span></button></th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="apptTableBody"></tbody>
        </table>
        <p id="noResults" class="no-results" hidden>No appointments found.</p>
      </div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
